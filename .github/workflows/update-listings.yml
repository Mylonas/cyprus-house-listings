name: Update Cyprus house listings

on:
  schedule:
    # Every 6 hours. Real-estate inventory doesn't move hourly like fuel
    # prices, so this is deliberately less aggressive than deals-blog's
    # hourly crons — tune via cron string if you want it more/less frequent.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

# The refresh commit is pushed back to master with GITHUB_TOKEN, which is
# read-only by default.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # A hung scraper should fail fast, not burn the 6-hour Actions limit.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Scrape all house sources and rebuild page
        run: npm run scrape

      - name: Scrape plot/land sources and rebuild plots page
        run: npm run scrape:plots
        continue-on-error: true

      - name: Commit and push if listings changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/listings.json public/index.html src/data/plots.json public/plots.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh listings data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made with GITHUB_TOKEN don't trigger the deploy workflow,
      # so deploy directly when the data changed.
      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=cyprus-house-listings
