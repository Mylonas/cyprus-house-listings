name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  # Manual trigger so a refresh pushed with "[skip ci]" (which suppresses the
  # push event) can still be deployed on demand: `gh workflow run deploy.yml`.
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy public/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=cyprus-house-listings
