<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyprus House Listings — Internal Reference</title>
<style>
  :root {
    --bg: #f4f5f7; --card-bg: #ffffff; --border: #e2e4e8; --text: #1c1f26;
    --muted: #6b7280; --accent: #1d4ed8; --accent-bg: #eef2ff; --tag: #374151;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { background:#111827; color:#fff; padding:20px 28px; }
  header h1 { margin:0 0 4px; font-size:22px; }
  header p { margin:0; color:#9ca3af; font-size:13px; }
  .stats { display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; }
  .stat { background:#1f2937; padding:6px 12px; border-radius:6px; font-size:12px; color:#e5e7eb; }
  .stat b { color:#fff; font-size:14px; }

  .filters { position: sticky; top:0; z-index: 10; background:#fff; border-bottom:1px solid var(--border); padding:14px 28px; display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
  .filter-group { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); }
  .filter-group label { font-weight:600; }
  .filter-group input, .filter-group select { padding:6px 8px; border:1px solid var(--border); border-radius:6px; font-size:13px; min-width:110px; }
  .filter-group.grow { flex:1; min-width:180px; }
  .filter-group.grow input { min-width:100%; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { border:1px solid var(--border); border-radius:14px; padding:5px 12px; font-size:12px; cursor:pointer; user-select:none; background:#fff; color:var(--tag); }
  .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .reset-btn { padding:7px 14px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; color:var(--tag); }
  .reset-btn:hover { background:#f3f4f6; }

  .results-bar { padding:10px 28px; font-size:13px; color:var(--muted); }

  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap:16px; padding:6px 28px 40px; }
  .card { background:var(--card-bg); border:1px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
  .card-img { width:100%; height:170px; object-fit:cover; background:#e5e7eb; display:block; }
  .card-img.placeholder { display:flex; align-items:center; justify-content:center; color:#9ca3af; font-size:12px; text-align:center; padding:10px; }
  .card-body { padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-price { font-size:17px; font-weight:700; color:#111827; }
  .card-title { font-size:13.5px; font-weight:600; color:#1f2937; line-height:1.3; }
  .card-loc { font-size:12.5px; color:var(--muted); }
  .card-meta { display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-top:2px; }
  .card-meta span { background:#f3f4f6; padding:3px 7px; border-radius:5px; }
  .card-footer { margin-top:auto; display:flex; align-items:center; justify-content:space-between; padding-top:8px; border-top:1px solid #f0f1f3; }
  .source-tag { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:3px 8px; border-radius:4px; }
  .source-Altamira { background:#dbeafe; color:#1e3a8a; }
  .source-Bazaraki { background:#dcfce7; color:#14532d; }
  .source-eAuction { background:#fee2e2; color:#7f1d1d; }
  .source-Zyprus { background:#fef3c7; color:#78350f; }
  .source-BidX1 { background:#ede9fe; color:#4c1d95; }
  .card-link { font-size:12.5px; color:var(--accent); text-decoration:none; font-weight:600; }
  .card-link:hover { text-decoration:underline; }
  .posted { font-size:11px; color:#9ca3af; }
  .empty-state { padding:60px 28px; text-align:center; color:var(--muted); }
</style>
</head>

  <div class="filter-group">
    <label>Sort by</label>

  </div>
  <div class="filter-group">
    <label>Source</label>
    <div class="chips" id="sourceChips"></div>
  </div>
  <button class="reset-btn" id="resetBtn">Reset filters</button>
</div>

<div class="results-bar" id="resultsBar"></div>

const sources = [...new Set(LISTINGS.map(l => l.source))];
const districts = [...new Set(LISTINGS.map(l => l.district).filter(Boolean))].sort();

const state = { sources: new Set(sources), district: '', minPrice: null, maxPrice: null, minSqm: null, minBeds: null, sort: 'price_asc', q: '' };

function shortSource(s){ return s.split(' ')[0]; }

function renderChips(){
  const el = document.getElementById('sourceChips');
  el.innerHTML = '';
  sources.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (state.sources.has(s) ? ' active' : '');
    chip.textContent = s + ' (' + LISTINGS.filter(l=>l.source===s).length + ')';
    chip.onclick = () => {
      if (state.sources.has(s)) state.sources.delete(s); else state.sources.add(s);
      renderChips(); applyFilters();
    };
    el.appendChild(chip);
  });
}

function renderDistrictOptions(){
  const sel = document.getElementById('districtFilter');
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

function fmtPrice(n){
  if (n == null) return 'Price on request';
  return '€' + n.toLocaleString('en-US');
}

function postedRank(p){
  if (!p) return 999;
  const s = p.toLowerCase();
  if (s.includes('hour')) return 0;
  if (s === 'today') return 0.5;
  if (s === 'yesterday') return 1;
  const m = s.match(/(\\d+)\\s*day/); if (m) return parseInt(m[1]);
  const w = s.match(/(\\d+)\\s*week/); if (w) return parseInt(w[1])*7;
  // date formats DD/MM/YYYY for eAuction posted dates -> treat as far past, rank by recency desc later separately
  return 500;
}

function cardHtml(l){
  const img = l.image
    ? `<img class="card-img" src="${l.image}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img placeholder\\'>No photo available<\\/div>'">`
    : `<div class="card-img placeholder">${l.source === 'eAuction Cyprus' ? 'No photo published<br>(auction listing)' : 'No photo available'}</div>`;
  const meta = [];
  if (l.beds) meta.push(`<span>${l.beds} bed</span>`);
  if (l.baths) meta.push(`<span>${l.baths} bath</span>`);
  if (l.houseSqm) meta.push(`<span>${l.houseSqm} m² house</span>`);
  if (l.plotSqm) meta.push(`<span>${l.plotSqm} m² plot</span>`);
  if (l.buildYear) meta.push(`<span>Built ${l.buildYear}</span>`);
  if (l.auctionDate) meta.push(`<span>Auction ${l.auctionDate}</span>`);
  const sourceClass = 'source-' + shortSource(l.source);
  const posted = l.posted ? `<span class="posted">Posted: ${l.posted}</span>` : `<span class="posted">Posted: not shown by source</span>`;
  return `<div class="card">
    ${img}
    <div class="card-body">
      <div class="card-price">${l.priceDisplay ? '€'+l.price?.toLocaleString('en-US')+(l.priceDisplay.includes('reserve')?' (reserve)':'') : fmtPrice(l.price)}</div>
      <div class="card-title">${l.title}</div>
      <div class="card-loc">${l.location}${l.ref ? ' · Ref '+l.ref : ''}</div>
      <div class="card-meta">${meta.join('')}</div>
      ${posted}
      <div class="card-footer">
        <span class="source-tag ${sourceClass}">${l.source}</span>
        <a class="card-link" href="${l.link}" target="_blank" rel="noopener">View listing →</a>
      </div>
    </div>
  </div>`;
}

function applyFilters(){
  let items = LISTINGS.filter(l => state.sources.has(l.source));
  if (state.district) items = items.filter(l => l.district === state.district);
  if (state.minPrice != null) items = items.filter(l => l.price == null || l.price >= state.minPrice);
  if (state.maxPrice != null) items = items.filter(l => l.price == null || l.price <= state.maxPrice);
  if (state.minSqm != null) items = items.filter(l => l.houseSqm != null && l.houseSqm >= state.minSqm);
  if (state.minBeds != null) items = items.filter(l => l.beds != null && l.beds >= state.minBeds);
  if (state.q) {
    const q = state.q.toLowerCase();
    items = items.filter(l => (l.title||'').toLowerCase().includes(q) || (l.location||'').toLowerCase().includes(q) || (l.ref||'').toLowerCase().includes(q));
  }

  items = items.slice();
  if (state.sort === 'price_asc') items.sort((a,b) => (a.price ?? 1e15) - (b.price ?? 1e15));
  else if (state.sort === 'price_desc') items.sort((a,b) => (b.price ?? -1) - (a.price ?? -1));
  else if (state.sort === 'sqm_desc') items.sort((a,b) => (b.houseSqm ?? -1) - (a.houseSqm ?? -1));
  else if (state.sort === 'plot_desc') items.sort((a,b) => (b.plotSqm ?? -1) - (a.plotSqm ?? -1));
  else if (state.sort === 'recent') items.sort((a,b) => postedRank(a.posted) - postedRank(b.posted));

  document.getElementById('resultsBar').textContent = `Showing ${items.length} of ${LISTINGS.length} listings`;
  const grid = document.getElementById('grid');
  if (items.length === 0) {
    grid.innerHTML = '';
    grid.insertAdjacentHTML('afterend', '');
    document.getElementById('grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">No listings match these filters. Try widening your search.</div>';
    return;
  }
  grid.innerHTML = items.map(cardHtml).join('');
}

function renderStats(){
  const el = document.getElementById('statsBar');
  const withPhoto = LISTINGS.filter(l=>l.image).length;
  const priced = LISTINGS.filter(l=>l.price!=null);
  const avg = priced.length ? Math.round(priced.reduce((s,l)=>s+l.price,0)/priced.length) : 0;
  el.innerHTML = `
    <div class="stat"><b>${LISTINGS.length}</b> total listings</div>
    <div class="stat"><b>${sources.length}</b> sources</div>
    <div class="stat"><b>${withPhoto}</b> with photos</div>
    <div class="stat"><b>€${avg.toLocaleString('en-US')}</b> average asking price</div>
    <div class="stat"><b>${districts.length}</b> districts covered</div>
  `;
}

document.getElementById('searchInput').addEventListener('input', e => { state.q = e.target.value; applyFilters(); });
document.getElementById('districtFilter').addEventListener('change', e => { state.district = e.target.value; applyFilters(); });
document.getElementById('minPrice').addEventListener('input', e => { state.minPrice = e.target.value ? Number(e.target.value) : null; applyFilters(); });
document.getElementById('maxPrice').addEventListener('input', e => { state.maxPrice = e.target.value ? Number(e.target.value) : null; applyFilters(); });
document.getElementById('minSqm').addEventListener('input', e => { state.minSqm = e.target.value ? Number(e.target.value) : null; applyFilters(); });
document.getElementById('minBeds').addEventListener('change', e => { state.minBeds = e.target.value ? Number(e.target.value) : null; applyFilters(); });
document.getElementById('sortBy').addEventListener('change', e => { state.sort = e.target.value; applyFilters(); });
document.getElementById('resetBtn').addEventListener('click', () => {
  state.sources = new Set(sources); state.district=''; state.minPrice=null; state.maxPrice=null; state.minSqm=null; state.minBeds=null; state.sort='price_asc'; state.q='';
  document.getElementById('searchInput').value=''; document.getElementById('districtFilter').value='';
  document.getElementById('minPrice').value=''; document.getElementById('maxPrice').value=''; document.getElementById('minSqm').value='';
  document.getElementById('minBeds').value=''; document.getElementById('sortBy').value='price_asc';
  renderChips(); applyFilters();
});

renderStats();
renderChips();
renderDistrictOptions();
applyFilters();
</script>
